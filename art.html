<!-- thanks @bruholiverlol on dc for helping me with this script, check him out here https://oliverspace.neocities.org/-->
    <script>
        const images = [
            "/images/rejection_1080.png",
            "/images/dark_twitter.png",
            "/images/everlasting_LOL.png",
            "/images/blossom_of_ashes.png",
            "/images/666_redo.png",
            "/images/vignette_logo.png",
            "/images/axes_simpler_bg.png",
            "/images/fractured angel lolz.png",
            "/images/Words_I_Never_Said.png",
            "/images/Change_Myself_Completely_Black_BG.png"
        ];
        const dates = [
            "3/15/2026",
            "3/14/2026",
            "3/13/2026",
            "3/10/2026",
            "3/9/2026",
            "2/26/2026",
            "3/12/2026",
            "10/27/2025",
            "9/22/2025",
            "9/20/2025"
        ];
        const titles = [
            "signal :(",
            "dive for the heart",
            "everlasting eternity",
            "blossom of ashes",
            "666 over!! redo",
            "saberchamber 2025",
            "establishedaxes pfp",
            "fractured angel",
            "words i never said",
            "change myself completely"
        ];
        const inspo = [
            "inspired by signal by rejection",
            "collab with Alex Bennett from deskGen",
            "inspired by everlasting eternity by ludicin",
            "inspired by blossom of ashes by ludicin",
            "inspired by the album 666 over!!",
            "created for saberchamber2025 by oermergeesh",
            "commission for establishedaxes",
            "inspired by fractured angel by dj raisei",
            "inspired by absolutely nothing.",
            "inspired by dxsbond metalheart tutorial",
        ];    


    // pre loading
    images.forEach(src => new Image().src = src);

    let currentIndex =      0;
    document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("example-image").src = images[currentIndex];
    document.getElementById("titles").innerHTML = `<i>"${titles[currentIndex]}"</i>`;
    document.getElementById("image-date").innerHTML = `<i>${dates[currentIndex]}</i>`;
    document.getElementById("inspo").textContent = inspo[currentIndex];
    });

    function swapImg() {
        const imgElement = document.getElementById("example-image");
        
        currentIndex++;

        if (currentIndex < images.length) {
            // next img
            imgElement.src = images[currentIndex];
            document.getElementById("image-date").innerHTML = `<i>${dates[currentIndex]}</i>`;
            document.getElementById("titles").innerHTML = `<i>"${titles[currentIndex]}"</i>`;
            document.getElementById("inspo").textContent = `${inspo[currentIndex]}`;


        } else {
            currentIndex = 0;
            imgElement.src = images[currentIndex];
            document.getElementById("image-date").innerHTML = `<i>${dates[currentIndex]}</i>`;
            document.getElementById("titles").innerHTML = `<i>"${titles[currentIndex]}"</i>`;
            document.getElementById("inspo").textContent = `${inspo[currentIndex]}`;

        }
    }
    function swapImgBack() {
        const imgElement = document.getElementById("example-image");
        currentIndex--;

        if (currentIndex >= 0) {
            // previous img
            imgElement.src = images[currentIndex];
            document.getElementById("image-date").innerHTML = `<i>${dates[currentIndex]}</i>`;
            document.getElementById("titles").innerHTML = `<i>"${titles[currentIndex]}"</i>`;
            document.getElementById("inspo").textContent = `${inspo[currentIndex]}`;

        } else {
            currentIndex = images.length - 1;
            imgElement.src = images[currentIndex];
            document.getElementById("image-date").innerHTML = `<i>${dates[currentIndex]}</i>`;
            document.getElementById("titles").innerHTML = `<i>"${titles[currentIndex]}"</i>`;
            document.getElementById("inspo").textContent = `${inspo[currentIndex]}`;

        }
    }
    </script>
        <img class="cool"
            id="example-image"
            style="border: #000000 .1rem solid;"
        />
    <div id="arrows">
        <p id="titles" style="font-size: 1.5rem; opacity: 0.7;"><i></i></p>

        <div id="centerstuff">
            <img       
                src="/images/left arrow.png"
                width="30rem"
                height="50rem"
                style="cursor: pointer;"
                onclick="swapImgBack()"
            />

            <p id="image-date" style="font-size: 1.5rem; opacity: 0.7; "></i></p>

            <img
                src="/images/arrow.png"
                width="30rem"
                height="50rem"
                style="cursor: pointer;"
                onclick="swapImg()"
            />
        </div>
        <p id="inspo" style="font-size: 1.5rem; opacity: 0.7;"></p>
    </div>
